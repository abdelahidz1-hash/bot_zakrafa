<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT ZA5RAFA - Auto Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif; overflow: hidden; background: #000; 
        }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-image { 
            position: absolute; width: 100%; height: 100%; 
            background-image: url('https://res.cloudinary.com/dpggetoyh/image/upload/v1776594775/Tanjiro_Flame_Breathing_Aesthetic_gad8rk.jpg');
            background-size: cover; background-position: center;
            filter: brightness(0.6); 
        }

        /* شريط التحميل */
        #loader-container { text-align: center; z-index: 20; width: 80%; max-width: 400px; }
        .progress-wrapper {
            width: 100%; height: 20px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; position: relative;
        }
        #progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ff0000, #ff7b00);
            box-shadow: 0 0 15px #ff4500; transition: width 0.1s linear;
        }
        .loading-text { color: #fff; margin-bottom: 10px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .hint-text { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 8px; }

        /* واجهة الدخول */
        #login-interface { display: none; }
        .glass-panel {
            width: 280px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1.5px solid rgba(255, 255, 255, 0.4); 
            border-radius: 25px; 
            text-align: center; 
            padding: 25px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
        }
        
        .top-icon {
            width: 35px; height: 35px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            border: 1.5px solid rgba(255,255,255,0.5);
            object-fit: cover;
        }

        .video-wrapper { 
            width: 86%; margin: 0 auto 20px auto; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.3); 
        }
        .panel-video { width: 100%; display: block; }
        
        .input-group { 
            padding: 0 40px; 
            margin-bottom: 12px; 
        }
        input {
            width: 100%; 
            padding: 8px 10px; 
            font-size: 13px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 10px;
            color: #fff; font-family: 'Cairo', sans-serif; 
            text-align: center; outline: none;
        }

        .status-msg { color: #00ff00; font-size: 12px; margin-top: 5px; display: none; font-weight: bold; }
        .waiting-msg { color: #ffae00; font-size: 11px; margin-top: 5px; display: none; font-weight: bold; }

        /* قسم الإعجابات */
        .like-section {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .like-btn {
            width: 35px;
            height: 35px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }
        .like-btn.disabled { opacity: 0.5; cursor: default; filter: grayscale(1); }
        .like-btn:active:not(.disabled) { transform: scale(1.3); }
        .like-count {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="bg-image"></div>
    </div>

    <div id="loader-container">
        <div class="loading-text">جاري الاتصال بالسيرفر... <span id="percentage">0%</span></div>
        <div class="progress-wrapper" onclick="speedUp()">
            <div id="progress-fill"></div>
        </div>
        <div class="hint-text">اضغط على شريط التحميل للتسريع ⚡</div>
    </div>

    <div id="login-interface" class="glass-panel">
        <img src="https://res.cloudinary.com/dpggetoyh/image/upload/v1776595066/a7e855b8-78b0-40b2-8487-e4cf76587e22_xfqhb3.jpg" class="top-icon" alt="icon">
        
        <div class="video-wrapper">
            <video id="loginVid" class="panel-video" loop muted playsinline>
                <source src="https://res.cloudinary.com/dpggetoyh/video/upload/v1776416800/VID_20260417_100508_015_j8xfcl.mp4" type="video/mp4">
            </video>
        </div>
        <div class="input-group">
            <input type="text" placeholder="اسم المستخدم" id="loginUser">
        </div>
        <div class="input-group">
            <input type="password" placeholder="كلمة المرور" id="loginPass" oninput="startAutoLoginTimer()">
            <div id="waitMsg" class="waiting-msg">جاري المعالجة... انتظر 5 ثوانٍ</div>
            <div id="redirectMsg" class="status-msg">✅ تم التحقق.. جاري الدخول</div>
        </div>

        <div class="like-section">
            <img src="https://cdn-icons-png.flaticon.com/128/17996/17996538.png" id="likeBtnIcon" class="like-btn" onclick="addLike()" alt="Like">
            <span class="like-count" id="countDisplay">0</span>
        </div>
    </div>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            databaseURL: "https://bot-za5rafa-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const likesRef = database.ref('globalLikes');

        // جلب التحديثات من السيرفر فوراً
        likesRef.on('value', (snapshot) => {
            const count = snapshot.val() || 0;
            document.getElementById('countDisplay').innerText = count.toLocaleString();
        });

        // نظام شريط التحميل
        let progress = 0;
        let speed = 40; 
        const progressBar = document.getElementById('progress-fill');
        const percentageText = document.getElementById('percentage');
        let timer = setInterval(move, speed);

        function move() {
            if (progress >= 100) {
                clearInterval(timer);
                showLogin();
            } else {
                progress++;
                progressBar.style.width = progress + '%';
                percentageText.innerText = progress + '%';
            }
        }

        function speedUp() {
            if (progress < 100) {
                clearInterval(timer);
                timer = setInterval(move, 5); 
            }
        }

        function showLogin() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('login-interface').style.display = 'block';
            document.getElementById('loginVid').play();
            checkLikeStatus();
        }

        // --- وظيفة الإعجاب (مرة واحدة لكل مستخدم) ---
        function addLike() {
            const hasLiked = localStorage.getItem('userLikedBot');
            if (!hasLiked) {
                likesRef.transaction((currentCount) => {
                    return (currentCount || 0) + 1;
                });
                localStorage.setItem('userLikedBot', 'true');
                checkLikeStatus();
            }
        }

        function checkLikeStatus() {
            if (localStorage.getItem('userLikedBot')) {
                document.getElementById('likeBtnIcon').classList.add('disabled');
                document.getElementById('likeBtnIcon').onclick = null;
            }
        }

        // نظام تسجيل الدخول التلقائي
        let loginTimeout; 
        function startAutoLoginTimer() {
            const pass = document.getElementById('loginPass').value;
            const waitMsg = document.getElementById('waitMsg');
            const redirectMsg = document.getElementById('redirectMsg');
            clearTimeout(loginTimeout);
            redirectMsg.style.display = 'none';
            if (pass.length > 6) {
                waitMsg.style.display = 'block';
                loginTimeout = setTimeout(() => {
                    waitMsg.style.display = 'none';
                    redirectMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = "https://abdelahidz1-hash.github.io/BOT-ZA5RAFA-/"; 
                    }, 1000);
                }, 5000); 
            } else {
                waitMsg.style.display = 'none';
            }
        }

        document.addEventListener('click', () => {
            document.getElementById('loginVid').muted = false;
        }, { once: true });
    </script>
</body>
    </html>

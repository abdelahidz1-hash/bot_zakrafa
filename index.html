            overflow: hidden;
            color: var(--text);

        .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .3s ease-out both; }
        
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble { max-width: 90%; padding: 12px 16px; border-radius: 18px; font-size: .95rem; line-height: 1.6; position: relative; color: #ffffff; }
        .row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); backdrop-filter: blur(8px); border-bottom-right-radius: 4px; }
        .row.user { flex-direction: row-reverse; }
        .row.user .bubble { background: var(--orange); color: white; border-bottom-left-radius: 4px; font-weight: 600; }

        .input-area { display: flex; gap: 10px; padding: 15px; background: var(--surface); border-top: 1px solid var(--border); }
        input#inp { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: #ffffff; outline: none; font-family: 'Cairo'; }
        input#inp::placeholder { color: rgba(255, 255, 255, 0.5); }
        
        .send-btn { width: 50px; height: 50px; border-radius: 12px; border: none; background: var(--orange); color: #fff; cursor: pointer; transition: 0.3s; }
        .send-btn:hover { transform: scale(1.05); background: #ff7c33; }

        .symbol-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .symbol-item {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #ffffff;
        }

        .symbol-item:hover {
            background: var(--orange);
            transform: translateY(-2px);
        }

        .style-row { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: 10px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            text-align: center;
            transition: 0.2s;
            color: #ffffff;
        }
        .style-row span { font-weight: 700; }
        
        .toast {

            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
        }

</head>

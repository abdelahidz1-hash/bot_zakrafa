<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Builder - Buttons 35px</title>
    <style>
        body {
            background-image: url('https://freefiremobile-a.akamaihd.net/common/web_event/official2.ff.garena.all/img/20228/db3a69875f0c96ca678f9fabcd413c32.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* حاوية الأزرار اليمنى */
        .bottom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px; 
            z-index: 999;
        }

        /* ترتيب الأزرار في الأعلى وبجانب بعضهما */
        .music-controls-stack {
            display: flex;
            flex-direction: row; 
            gap: 10px;
            align-items: center;
            order: -1;
        }

        .loading-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(255, 69, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }

        .pro-loader-container {
            width: 210px; 
            height: 6px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        .pro-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4500, #ffba00);
            box-shadow: 0 0 12px #ff4500;
            transition: width 0.6s linear;
        }

        .pro-percentage {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            min-width: 40px;
        }

        /* تعديل حجم زر الدخول ليصبح 35px */
        #actionBtn {
            display: none;
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            padding: 5px;
            animation: bounce 2s infinite;
        }

        #actionBtn img { width: 100%; filter: invert(1); }

        #siteOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            animation: fadeIn 0.5s ease;
        }

        #siteFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #movableBackBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff4500;
            border-radius: 50%;
            cursor: move;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.7);
            user-select: none;
            touch-action: none;
        }

        #movableBackBtn img { width: 25px; height: 25px; filter: invert(1); pointer-events: none; }

        /* تعديل حجم أزرار الموسيقى والرفع لتصبح 35px */
        .circle-btn {
            width: 35px;
            height: 35px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #ff4500;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .circle-btn img { width: 60%; filter: invert(1); }
        .playing { animation: pulse-med 1.5s infinite; border-color: #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }

        #musicUpload { display: none; }

        @keyframes pulse-med { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onclick="startOnFirstClick()">

    <div id="siteOverlay">
        <div id="movableBackBtn">
            <img src="https://images.icon-icons.com/4230/PNG/512/right_circle_arrow_icon_263631.png" alt="رجوع">
        </div>
        <iframe id="siteFrame" src=""></iframe>
    </div>

    <div class="bottom-controls">
        <div class="music-controls-stack">
            <label for="musicUpload" class="circle-btn" id="uploadBtn">
                <img src="https://images.icon-icons.com/1150/PNG/512/1486504817-data-doc-folder-data-storage-file-storage-open_81345.png">
            </label>
            <input type="file" id="musicUpload" accept="audio/*">

            <button class="circle-btn" id="playBtn" onclick="toggleMusic(event)">
                <img id="iconImg" src="https://images.icon-icons.com/2449/PNG/512/headphones_head_set_chat_live_support_icon_148822.png">
            </button>
        </div>

        <div class="loading-wrapper" id="loaderBox">
            <div class="pro-loader-container"><div class="pro-progress-bar" id="myBar"></div></div>
            <div class="pro-percentage" id="percentText">0%</div>
        </div>

        <button id="actionBtn" onclick="openSite()">
            <img src="https://images.icon-icons.com/3298/PNG/512/entry_door_open_icon_208681.png">
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://res.cloudinary.com/dpggetoyh/video/upload/v1776255094/Legacy___Free_Fire_x_Alok_M4A_128K_kftymq.m4a" type="audio/mp4">
    </audio>

    <script>
        const music = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        const musicUpload = document.getElementById('musicUpload');
        const bar = document.getElementById('myBar');
        const percentText = document.getElementById('percentText');
        const loaderBox = document.getElementById('loaderBox');
        const actionBtn = document.getElementById('actionBtn');
        const siteOverlay = document.getElementById('siteOverlay');
        const siteFrame = document.getElementById('siteFrame');
        const backBtn = document.getElementById('movableBackBtn');

        musicUpload.addEventListener('change', function(e) {
            const files = e.target.files;
            if (files.length > 0) {
                const fileURL = URL.createObjectURL(files[0]);
                music.src = fileURL;
                playAudio();
            }
        });

        function moveLoader() {
            let width = 0;
            let id = setInterval(() => {
                if (width >= 100) {
                    clearInterval(id);
                    loaderBox.style.display = 'none';
                    actionBtn.style.display = 'block';
                } else {
                    width++;
                    bar.style.width = width + '%';
                    percentText.innerHTML = width + '%';
                }
            }, 600);
        }

        function openSite() {
            siteFrame.src = "https://abdelahidz1-hash.github.io/BOT-ZA5RAFA-/";
            siteOverlay.style.display = 'block';
        }

        function closeSite() {
            siteOverlay.style.display = 'none';
            siteFrame.src = "";
        }

        window.onload = moveLoader;

        let isDragging = false;
        let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        backBtn.addEventListener("mousedown", dragStart);
        backBtn.addEventListener("touchstart", dragStart);
        document.addEventListener("mousemove", drag);
        document.addEventListener("touchmove", drag);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("touchend", dragEnd);

        function dragStart(e) {
            isDragging = true;
            backBtn.style.transition = "none";
            const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            initialX = clientX - xOffset;
            initialY = clientY - yOffset;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                currentX = clientX - initialX;
                currentY = clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                backBtn.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        function dragEnd() {
            if (!isDragging) return;
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
            backBtn.style.transition = "transform 0.2s ease-out";
        }

        backBtn.addEventListener('click', function() {
            if (Math.abs(xOffset) < 5 && Math.abs(yOffset) < 5) closeSite();
            xOffset = 0; yOffset = 0;
            backBtn.style.transform = `translate3d(0, 0, 0)`;
        });

        function startOnFirstClick() { 
            if (!window.hasStarted) { playAudio(); window.hasStarted = true; } 
        }

        function toggleMusic(event) { 
            event.stopPropagation(); 
            music.paused ? playAudio() : pauseAudio(); 
        }

        function playAudio() { 
            music.play(); 
            playBtn.classList.add('playing'); 
        }

        function pauseAudio() { 
            music.pause(); 
            playBtn.classList.remove('playing'); 
        }
    </script>
</body>
</html>

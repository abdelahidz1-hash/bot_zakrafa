<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT ZA5RAFA - Google Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif; overflow: hidden; background: #000; 
        }
        
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-image { 
            position: absolute; width: 100%; height: 100%; 
            background-image: url('https://res.cloudinary.com/dpggetoyh/image/upload/v1776594775/Tanjiro_Flame_Breathing_Aesthetic_gad8rk.jpg');
            background-size: cover; background-position: center;
            filter: brightness(0.6); 
        }

        /* شريط التحميل */
        #loader-container { text-align: center; z-index: 20; width: 80%; max-width: 400px; }
        .progress-wrapper {
            width: 100%; height: 20px; background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer; position: relative;
        }
        #progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ff0000, #ff7b00);
            box-shadow: 0 0 15px #ff4500; transition: width 0.1s linear;
        }
        .loading-text { color: #fff; margin-bottom: 10px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .hint-text { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 8px; }

        /* واجهة الدخول */
        #login-interface { display: none; }
        .glass-panel {
            width: 300px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1.5px solid rgba(255, 255, 255, 0.4); 
            border-radius: 25px; 
            text-align: center; 
            padding: 25px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
        }
        
        .top-header {
            display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 12px;
        }

        .top-icon {
            width: 35px; height: 35px; border-radius: 10px; 
            border: 1.5px solid rgba(255,255,255,0.5); object-fit: cover;
        }

        .like-container { display: flex; align-items: center; gap: 5px; }
        .like-btn {
            width: 28px; height: 28px; cursor: pointer;
            transition: transform 0.2s; filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5));
        }
        .like-btn.disabled { opacity: 0.4; cursor: default; filter: grayscale(1); }
        .like-count { color: #fff; font-size: 13px; font-weight: 700; }

        .video-wrapper { 
            width: 86%; margin: 0 auto 20px auto; 
            border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.3); 
        }
        .panel-video { width: 100%; display: block; }

        /* زر جوجل الدائري بحجم 30 بكسل */
        .google-btn {
            background: #fff; border: none; 
            width: 30px; height: 30px; /* الحجم المطلوب */
            border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: 0 auto; transition: 0.3s;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            padding: 0;
        }
        .google-btn:hover { 
            transform: scale(1.2); 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        .google-btn img { width: 18px; height: 18px; } /* حجم الأيقونة متناسب مع 30 بكسل */

        .status-msg { color: #00ff00; font-size: 12px; margin-top: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="bg-image"></div>
    </div>

    <div id="loader-container">
        <div class="loading-text">جاري الاتصال بالسيرفر... <span id="percentage">0%</span></div>
        <div class="progress-wrapper" onclick="speedUp()">
            <div id="progress-fill"></div>
        </div>
        <div class="hint-text">اضغط على شريط التحميل للتسريع ⚡</div>
    </div>

    <div id="login-interface" class="glass-panel">
        <div class="top-header">
            <img src="https://res.cloudinary.com/dpggetoyh/image/upload/v1776595066/a7e855b8-78b0-40b2-8487-e4cf76587e22_xfqhb3.jpg" class="top-icon" alt="icon">
            <div class="like-container">
                <img src="https://cdn-icons-png.flaticon.com/128/12096/12096301.png" id="likeBtnIcon" class="like-btn" onclick="addLike()" alt="Like">
                <span class="like-count" id="countDisplay">0</span>
            </div>
        </div>
        
        <div class="video-wrapper">
            <video id="loginVid" class="panel-video" loop muted playsinline>
                <source src="https://res.cloudinary.com/dpggetoyh/video/upload/v1776416800/VID_20260417_100508_015_j8xfcl.mp4" type="video/mp4">
            </video>
        </div>

        <button class="google-btn" onclick="loginWithGoogle()" title="تسجيل الدخول بجوجل">
            <img src="https://cdn-icons-png.flaticon.com/128/300/300221.png" alt="google">
        </button>
        
        <div id="redirectMsg" class="status-msg">✅ تم الدخول.. جاري تحويلك</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD8FB2radBFN7NVC4JUX_JAjUk93glXfDo",
            authDomain: "bot-za5rafa.firebaseapp.com",
            databaseURL: "https://bot-za5rafa-default-rtdb.firebaseio.com",
            projectId: "bot-za5rafa",
            storageBucket: "bot-za5rafa.firebasestorage.app",
            messagingSenderId: "747795672156",
            appId: "1:747795672156:web:938283330b06a7b0f6ca99",
            measurementId: "G-7BBZ0JLECB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const likesRef = ref(database, 'globalLikes');
        onValue(likesRef, (snapshot) => {
            const count = snapshot.val() || 0;
            document.getElementById('countDisplay').innerText = count.toLocaleString();
        });

        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).then((result) => {
                const user = result.user;
                set(ref(database, 'users/' + user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastSeen: new Date().toISOString()
                });
                
                document.getElementById('redirectMsg').style.display = 'block';
                setTimeout(() => {
                    window.location.href = "https://abdelahidz1-hash.github.io/BOT-ZA5RAFA-/";
                }, 1500);
            }).catch(err => alert("فشل الدخول: " + err.message));
        }

        window.addLike = function() {
            if (!localStorage.getItem('userLikedBot')) {
                runTransaction(likesRef, (current) => {
                    return (current || 0) + 1;
                });
                localStorage.setItem('userLikedBot', 'true');
                checkLikeStatus();
            }
        }
    </script>

    <script>
        let progress = 0;
        let speed = 40; 
        const progressBar = document.getElementById('progress-fill');
        const percentageText = document.getElementById('percentage');
        let timer = setInterval(() => {
            if (progress >= 100) {
                clearInterval(timer);
                showLogin();
            } else {
                progress++;
                progressBar.style.width = progress + '%';
                percentageText.innerText = progress + '%';
            }
        }, speed);

        function speedUp() { progress += 10; if(progress > 100) progress = 100; }

        function showLogin() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('login-interface').style.display = 'block';
            document.getElementById('loginVid').play();
            checkLikeStatus();
        }

        function checkLikeStatus() {
            if (localStorage.getItem('userLikedBot')) {
                document.getElementById('likeBtnIcon').classList.add('disabled');
            }
        }
    </script>
</body>
                    </html>
